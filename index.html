<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Works</title>
    <!-- Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Icons: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>


    <!-- Top Navigation for Projects -->
    <nav id="top-nav">
        <!-- Links will be injected by JS -->
    </nav>

    <!-- Main Content Area -->
    <main id="app-container">

        <!-- Flip Mode (PageFlip) -->
        <section id="view-flip" class="view-section active">
            <div id="flip-container">
                <div id="flip-book">
                    <!-- Pages will be injected here by JS -->
                </div>
            </div>
            <!-- Pagination / Info overlay -->
            <div id="flip-pagination-ui">
                <button id="btn-prev-page" class="page-nav-btn" title="Previous Page"><i
                        class="fa-solid fa-chevron-left"></i></button>
                <div id="flip-page-info"><span id="flip-page-current">-</span> / <span id="flip-page-total">-</span>
                </div>
                <button id="btn-next-page" class="page-nav-btn" title="Next Page"><i
                        class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>

        <!-- Project Mode (Scroll) -->
        <section id="view-scroll" class="view-section">
            <div id="scroll-container">
                <!-- Projects will be injected here by JS -->
            </div>
        </section>

        <!-- Index Mode (Grid) -->
        <section id="view-grid" class="view-section">
            <div id="grid-container">
                <!-- Thumbnails will be injected here by JS -->
            </div>
        </section>

        <!-- Movie Mode (Links & Videos) -->
        <section id="view-movie" class="view-section">
            <div id="movie-container">
                <!-- Movie links and videos will be injected here -->
            </div>
        </section>

    </main>

    <!-- Toolbar -->
    <nav id="toolbar">
        <button id="btn-flip" class="tool-btn active" title="Flip Mode (Book)"><i
                class="fa-solid fa-book-open"></i></button>
        <button id="btn-scroll" class="tool-btn" title="Project Mode (Scroll)"><i
                class="fa-solid fa-arrows-up-down"></i></button>
        <button id="btn-grid" class="tool-btn" title="Index Mode (Grid)"><i
                class="fa-solid fa-table-cells-large"></i></button>
        <button id="btn-movie" class="tool-btn" title="Movie View"><i class="fa-solid fa-film"></i></button>
        <div class="separator"></div>
        <button id="btn-fullscreen" class="tool-btn" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
    </nav>

    <!-- Video Modal -->
    <div id="video-modal" class="modal-hidden">
        <button id="btn-close-video"><i class="fa-solid fa-xmark"></i></button>
        <div class="video-wrapper">
            <video id="fullscreen-video" controls loop playsinline>
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <!-- PageFlip.js Library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="main.js"></script>
</body>

</html>
